<!DOCTYPE html>
<html>
<head>
  <title>AirOps Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    /* LADO IZQUIERDO (IMAGEN) */
    .left {
      flex: 1;
      background:
        url('img/login sistema de vuelos borde.png') no-repeat top left,
        url('img/login sistema de vuelos.png') no-repeat right center;


background-size: auto, cover;
    }


    /* LADO DERECHO */
    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('img/login sistema de vuelos borde.png') no-repeat top right;
    }

    /* TARJETA */
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    .logo {
      font-size: 40px;
      color: #1d4ed8;
    }
}

    h2 {
      margin: 10px 0;
    }

    p {
      color: gray;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #163bb3;
    }

    .extra {
      margin-top: 15px;
      font-size: 12px;
      color: gray;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- IZQUIERDA -->
<div class="left"></div>

<!-- DERECHA -->
<div class="right">
  <div class="login-box">
    <div class="logo">✈</div>
    <h2>AirOps System</h2>
    <p>Inicia sesión para continuar</p>

    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>

    <div class="extra">
      ¿Olvidó su contraseña?
    </div>

    <div class="error" id="error"></div>
  </div>
</div>

<script>
function login() {
  const usuario = document.getElementById('usuario').value;
  const password = document.getElementById('password').value;

  fetch('http://localhost:3000/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ usuario, password })
  })
  .then(res => {
    if (!res.ok) throw new Error();
    return res.json();
  })
  .then(data => {
    if (data.ok) {
      window.location.href = 'index.html';
    }
  })
  .catch(() => {
    document.getElementById('error').textContent = 'Credenciales incorrectas';
  });
}
</script>

</body>
</html>
